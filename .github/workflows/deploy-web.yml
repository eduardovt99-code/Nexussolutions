name: Deploy Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/Nexussolutions/" --pwa-strategy=none

      - name: Cache bust JS bundle
        run: |
          BUILD=$(grep "static const String build" lib/demo_version.dart | sed "s/.*'\([^']*\)'.*/\1/")
          echo "{\"build\":\"${BUILD}\"}" > build/web/version.json
          sed -i "s|\"mainJsPath\":\"main.dart.js\"|\"mainJsPath\":\"main.dart.js?v=${BUILD}\"|g" build/web/flutter_bootstrap.js
          sed -i "s|name=\"tajo-demo-build\" content=\"[0-9]*\"|name=\"tajo-demo-build\" content=\"${BUILD}\"|g" build/web/index.html
          sed -i "s|flutter_bootstrap.js?v=[0-9]*|flutter_bootstrap.js?v=${BUILD}|g" build/web/index.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
