<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nexus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>nexus</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Fuerza datos frescos cuando publicamos una nueva demo (debe coincidir con DemoVersion.build).
    (function () {
      var BUILD = '14';
      var KEY = 'nexus_demo_build';
      try {
        var stored = localStorage.getItem(KEY);
        var url = new URL(window.location.href);
        if (url.searchParams.get('b') !== BUILD) {
          if (stored !== BUILD) {
            localStorage.clear();
            sessionStorage.clear();
          }
          localStorage.setItem(KEY, BUILD);
          url.searchParams.set('b', BUILD);
          window.location.replace(url.toString());
          return;
        }
      } catch (e) {}
    })();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (var i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
  </script>
  <script src="flutter_bootstrap.js?v=14" async></script>
</body>
</html>
