<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="tajo-demo-build" content="16">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tajo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TAJO</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // La versión autoritativa vive en version.json (siempre sin caché).
    (function () {
      var KEY = 'tajo_demo_build';

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          for (var i = 0; i < regs.length; i++) regs[i].unregister();
        });
      }

      function embeddedBuild() {
        var meta = document.querySelector('meta[name="tajo-demo-build"]');
        return meta ? String(meta.getAttribute('content')) : '16';
      }

      function loadFlutter(build) {
        if (document.querySelector('script[data-tajo-bootstrap]')) return;
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js?v=' + build;
        s.async = true;
        s.setAttribute('data-tajo-bootstrap', '1');
        document.body.appendChild(s);
      }

      function applyBuild(build) {
        var url = new URL(window.location.href);
        var stored = null;
        try { stored = localStorage.getItem(KEY); } catch (e) {}

        if (url.searchParams.get('b') !== build || stored !== build) {
          try {
            localStorage.clear();
            sessionStorage.clear();
            localStorage.setItem(KEY, build);
          } catch (e) {}
          url.searchParams.set('b', build);
          window.location.replace(url.toString());
          return;
        }

        loadFlutter(build);
      }

      fetch('version.json?_=' + Date.now(), { cache: 'no-store' })
        .then(function (res) { return res.json(); })
        .then(function (data) { applyBuild(String(data.build)); })
        .catch(function () { applyBuild(embeddedBuild()); });
    })();
  </script>
</body>
</html>
